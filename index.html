<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Monoton&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playwrite+NZ+Basic:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="outer">
        <div name="top">
            <span id="name">Calculator</span>
        </div>
        
            <input type="text" placeholder="0" class="inputbox">
        
        <div class="gridbox">
             <div class="buttons">
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="symbol">/</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="symbol">*</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="symbol">-</button>

    <button>0</button>
    <button>.</button>
    <button>=</button>
    <button class="symbol">+</button>
        </div>
    </div>
    
<script src="script.js"></script>
</body>
</html>
